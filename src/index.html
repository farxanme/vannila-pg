<!doctype html>
<html lang="fa" dir="rtl" class="app-booting">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#007dff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title data-i18n="header.title">درگاه پرداخت اینترنتی سِپ</title>
    <!-- Match index.css: hide main until markAppReady() (before external CSS loads) -->
    <style>
      html.app-booting #app .main-content {
        visibility: hidden;
      }
    </style>

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />

    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/pages/index.css" />
    <link rel="stylesheet" href="/assets/css/pages/receipt.css" />
  </head>

  <body>
    <section
      id="browser-unsupported-section"
      class="init-error-section browser-unsupported-section"
      aria-labelledby="browser-unsupported-title"
      hidden
    >
      <div class="init-error-container">
        <div class="card browser-unsupported-card">
          <h2 id="browser-unsupported-title">مرورگر شما پشتیبانی نمی‌شود</h2>
          <p>
            نسخه مرورگر شما با این سرویس سازگار نیست. لطفا مرورگر خود را به‌روز کنید یا از مرورگر
            جدیدتری استفاده کنید.
          </p>
        </div>
      </div>
    </section>
    <div id="app" class="app-root">
      <!-- SSR: session fields (same as former Data.* hidden inputs). Server fills data-* values. -->
      <div
        id="payment-init-data"
        class="payment-init-data"
        hidden
        aria-hidden="true"
        data-user-session-key="F274EC8CF41D4A4A88050DDB6FAC534790DAC6C9BE623E88E58E8C95DD31511D"
        data-transaction-id="63"
        data-ref-num="9CCA4792E9F80F7E94513EC464412F4D97EF887A8B5300C95D2CD5E8ED5A8E56"
        data-terminal-number="2765"
        data-salt="7f479858b67248068fb4aa2a0b258965"
      ></div>

      <!-- Header will be inserted here -->

      <main class="main-content">
        <div class="container">
          <!-- Checkout flow (two-column grid) -->
          <section id="payment-flow-section" class="payment-flow-section">
            <div class="payment-main-card">
              <div class="grid grid-2-col">
                <!-- Large Section (2/3) -->
                <div class="card card-large">
                  <div class="card-header">
                    <h2 class="card-title" data-i18n="form.title"></h2>
                    <button
                      type="button"
                      class="card-header-help-btn"
                      id="card-header-help-button"
                      data-i18n-aria-label="common.help"
                      data-i18n-title="common.help"
                    >
                      <span
                        class="app-icon"
                        style="--app-icon-src: url('/assets/images/icons/icn-square-help.svg')"
                        aria-hidden="true"
                      ></span>
                    </button>
                  </div>

                  <div id="payment-form-region" class="payment-form-region">
                    <div
                      id="payment-submit-top-error"
                      class="payment-submit-top-error"
                      hidden
                    ></div>
                    <form id="payment-form" class="payment-form" method="post" autocomplete="off">
                      <!-- Card Number -->
                      <div class="form-group">
                        <div id="card-number-input-container"></div>
                        <div
                          id="gift-card-inline-notice"
                          class="gift-card-inline-notice"
                          hidden
                        ></div>
                        <div
                          id="pan-product-inline-notice"
                          class="pan-product-inline-notice"
                          hidden
                        ></div>
                      </div>

                      <!-- CVV2 and Expiry Date -->
                      <div class="form-group">
                        <div class="form-row">
                          <div id="cvv2-input-container" class="cvv2-input-container"></div>
                          <div id="expiry-date-container"></div>
                        </div>
                      </div>

                      <!-- Security Code (Captcha) -->
                      <div class="form-group">
                        <div id="captcha-container" class="captcha-container"></div>
                      </div>

                      <!-- OTP -->
                      <div class="form-group">
                        <div id="otp-input-container" class="otp-input-container"></div>
                      </div>

                      <!-- Save Card Checkbox -->
                      <div class="form-group">
                        <label class="save-card-toggle">
                          <input
                            type="checkbox"
                            id="save-card-checkbox"
                            class="save-card-checkbox"
                            autocomplete="off"
                            checked
                          />
                          <span class="save-card-icon" aria-hidden="true">
                            <span
                              class="app-icon"
                              style="
                                --app-icon-src: url('/assets/images/icons/icn-square-check.svg');
                              "
                              aria-hidden="true"
                            ></span>
                          </span>
                          <span class="save-card-text" data-i18n="form.saveCard"></span>
                        </label>
                      </div>

                      <!-- Form Actions -->
                      <div class="form-actions">
                        <button
                          type="submit"
                          class="btn btn-success pay-button"
                          id="pay-button"
                          data-i18n="form.pay"
                        ></button>
                        <button
                          type="button"
                          class="btn btn-primary btn-bordered bill-skip-button"
                          id="bill-skip-button"
                          data-i18n="bill.flow.skipRemaining"
                          hidden
                        ></button>
                        <button
                          type="button"
                          class="btn btn-primary btn-bordered cancel-button"
                          id="cancel-button"
                          data-i18n="form.cancel"
                        ></button>
                      </div>

                      <!-- Show Receipt -->
                      <div class="form-group show-receipt-wrapper">
                        <label class="show-receipt-toggle">
                          <input
                            type="checkbox"
                            id="show-receipt-toggle"
                            class="show-receipt-checkbox"
                            autocomplete="off"
                          />
                          <span class="show-receipt-icon" aria-hidden="true">
                            <span
                              class="app-icon"
                              style="
                                --app-icon-src: url('/assets/images/icons/icn-square-plus.svg');
                              "
                              aria-hidden="true"
                            ></span>
                          </span>
                          <span class="show-receipt-text" data-i18n="form.showReceiptToggle"></span>
                        </label>
                      </div>

                      <!-- Receipt Fields (Hidden initially) -->
                      <div id="receipt-fields" class="receipt-fields">
                        <div class="form-group">
                          <div id="mobile-input-container"></div>
                        </div>
                        <div class="form-group">
                          <div id="email-input-container"></div>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>

                <!-- Small Section (1/3) -->
                <div class="card card-small">
                  <div class="card-header timer-header" id="timer-header">
                    <h2 class="card-title" data-i18n="timer.title"></h2>
                    <div id="timer-container" class="timer">
                      <span class="timer-progress" aria-hidden="true"></span>
                      <div class="timer-value"></div>
                    </div>
                  </div>

                  <div id="partner-logos-section" class="partner-logos-section">
                    <div id="partner-logos" class="partner-logos">
                      <!-- Partner logos will be inserted here -->
                    </div>
                  </div>

                  <div id="transaction-info" class="transaction-info">
                    <!-- Transaction info will be inserted here -->
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- Successful pay: full-width receipt -->
          <section
            id="payment-receipt-section"
            class="init-error-section payment-receipt-section"
            hidden
            aria-labelledby="payment-receipt-title"
          >
            <div class="init-error-container receipt-container">
              <div class="card init-error-card" id="payment-receipt-card">
                <div class="receipt-header">
                  <span
                    class="receipt-status-icon app-icon"
                    id="payment-receipt-status-icon"
                    aria-hidden="true"
                  ></span>
                  <h1 class="receipt-title" id="payment-receipt-title"></h1>
                  <p class="receipt-subtitle" id="payment-receipt-subtitle"></p>
                  <div class="receipt-amount-bar">
                    <div class="receipt-amount" id="payment-receipt-amount"></div>
                    <div class="receipt-type" id="payment-receipt-headline"></div>
                  </div>
                  <div class="receipt-header-actions">
                    <button
                      type="button"
                      class="btn btn-primary receipt-complete-button"
                      id="payment-receipt-complete-button"
                    >
                      <span data-i18n="receipt.completeAndReturn"></span>
                    </button>
                    <button
                      type="button"
                      class="btn btn-primary receipt-download-button receipt-download-icon-button"
                      id="payment-receipt-save-button"
                    >
                      <span class="btn-icon" aria-hidden="true">
                        <span
                          class="app-icon"
                          style="--app-icon-src: url('/assets/images/icons/icn-square-plus.svg')"
                        ></span>
                      </span>
                      <span class="sr-only" data-i18n="receipt.download"></span>
                    </button>
                  </div>
                  <div class="receipt-return-timer" id="payment-receipt-return-timer" hidden>
                    <span class="timer-progress" aria-hidden="true"></span>
                    <span data-i18n="receipt.autoReturnPrefix"></span>
                    <strong id="payment-receipt-return-time-value"></strong>
                  </div>
                  <p class="receipt-header-notice" data-i18n="receipt.finalizationNotice"></p>
                </div>

                <div class="transaction-divider"></div>

                <section class="receipt-main-grid">
                  <div class="receipt-main-grid-header">
                    <h2 data-i18n="receipt.receiptTitle"></h2>
                  </div>

                  <div class="receipt-main-grid-columns" id="payment-receipt-columns">
                    <div class="receipt-info-column" data-column-kind="transaction">
                      <h3
                        class="transaction-info-section-title"
                        data-i18n="receipt.sectionTransaction"
                      ></h3>
                      <div class="receipt-info-rows">
                        <div
                          class="receipt-info-row"
                          id="payment-receipt-row-transaction-type"
                          hidden
                        >
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.transactionType"
                          ></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-transaction-type"
                          ></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-status" hidden>
                          <span class="receipt-info-row-label" data-i18n="receipt.status"></span>
                          <span class="receipt-info-row-value">
                            <span
                              class="badge badge-success"
                              id="payment-receipt-status-badge"
                            ></span>
                          </span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-trace" hidden>
                          <span class="receipt-info-row-label" data-i18n="receipt.traceCode"></span>
                          <span class="receipt-info-row-value" id="payment-receipt-trace"></span>
                        </div>
                        <div
                          class="receipt-info-row"
                          id="payment-receipt-row-digital-receipt"
                          hidden
                        >
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.digitalReceipt"
                          ></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-digital-receipt"
                          ></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-rrn" hidden>
                          <span class="receipt-info-row-label" data-i18n="receipt.rrn"></span>
                          <span class="receipt-info-row-value" id="payment-receipt-rrn"></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-card" hidden>
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.plain.card"
                          ></span>
                          <span
                            class="receipt-info-row-value payment-receipt-card-number"
                            id="payment-receipt-card-number"
                          ></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-bank" hidden>
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.issuerBank"
                          ></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-issuer-bank"
                          ></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-date" hidden>
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.transactionTime"
                          ></span>
                          <span class="receipt-info-row-value" id="payment-receipt-date"></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-total-amount" hidden>
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.transactionAmount"
                          ></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-total-amount"
                          ></span>
                        </div>
                        <div
                          class="receipt-info-row"
                          id="payment-receipt-row-discount-amount"
                          hidden
                        >
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.discountAmount"
                          ></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-discount-amount"
                          ></span>
                        </div>
                        <div
                          class="receipt-info-row"
                          id="payment-receipt-row-affective-amount"
                          hidden
                        >
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.deductedAmount"
                          ></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-affective-amount"
                          ></span>
                        </div>
                      </div>
                    </div>

                    <div
                      class="receipt-info-column payment-receipt-extra-column"
                      id="payment-receipt-extra-column"
                      data-column-kind="extra"
                      hidden
                    >
                      <h3
                        class="transaction-info-section-title"
                        id="payment-receipt-extra-title"
                        data-i18n="receipt.sectionInstallmentInfo"
                      ></h3>
                      <div class="receipt-info-rows" id="payment-receipt-extra-rows"></div>
                    </div>

                    <div class="receipt-info-column" data-column-kind="merchant">
                      <h3
                        class="transaction-info-section-title"
                        data-i18n="receipt.sectionMerchant"
                      ></h3>
                      <div class="receipt-info-rows">
                        <div
                          class="receipt-info-row"
                          id="payment-receipt-row-merchant-number"
                          hidden
                        >
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.merchantNumber"
                          ></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-merchant-number"
                          ></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-terminal" hidden>
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.terminalNumber"
                          ></span>
                          <span class="receipt-info-row-value" id="payment-receipt-terminal"></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-gateway-code" hidden>
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.gatewayCode"
                          ></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-gateway-code"
                          ></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-facilitator" hidden>
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.paymentFacilitator"
                          ></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-facilitator"
                          ></span>
                        </div>
                        <div class="receipt-info-row" id="payment-receipt-row-merchant-name" hidden>
                          <span class="receipt-info-row-label" data-i18n="receipt.merchant"></span>
                          <span
                            class="receipt-info-row-value"
                            id="payment-receipt-merchant-name"
                          ></span>
                        </div>
                        <div
                          class="receipt-info-row payment-receipt-row-merchant-site"
                          id="payment-receipt-row-merchant-site"
                          hidden
                        >
                          <span
                            class="receipt-info-row-label"
                            data-i18n="receipt.merchantSiteAddress"
                          ></span>
                          <span
                            class="receipt-info-row-value payment-receipt-merchant-site"
                            id="payment-receipt-merchant-site"
                          ></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </section>

                <div class="transaction-divider"></div>

                <div class="receipt-notice" role="note">
                  <p data-i18n="receipt.noticePolicy"></p>
                </div>
              </div>
            </div>
          </section>

          <!-- Bill flow completion screen (summary only; same shell as payment receipt) -->
          <section
            id="bill-flow-complete-section"
            class="init-error-section payment-receipt-section"
            hidden
            aria-labelledby="bill-flow-complete-title"
          >
            <div class="init-error-container receipt-container">
              <div class="card init-error-card" id="bill-flow-complete-card">
                <div class="receipt-header">
                  <span
                    class="receipt-status-icon app-icon"
                    id="bill-flow-complete-status-icon"
                    aria-hidden="true"
                  ></span>
                  <h1
                    class="receipt-title"
                    id="bill-flow-complete-title"
                    data-i18n="bill.flow.completeTitle"
                  ></h1>
                  <p
                    class="receipt-subtitle"
                    id="bill-flow-complete-subtitle"
                    data-i18n="bill.flow.completeDescription"
                  ></p>
                  <div class="receipt-header-actions">
                    <button
                      type="button"
                      class="btn btn-primary receipt-complete-button"
                      id="bill-flow-complete-return-button"
                    >
                      <span data-i18n="bill.flow.completeAndReturn"></span>
                    </button>
                  </div>
                  <div class="receipt-return-timer" id="bill-flow-return-timer" hidden>
                    <span class="timer-progress" aria-hidden="true"></span>
                    <span data-i18n="receipt.autoReturnPrefix"></span>
                    <strong id="bill-flow-return-time-value"></strong>
                  </div>
                  <p class="receipt-header-notice" data-i18n="bill.flow.noticeSettlement"></p>
                </div>

                <div class="transaction-divider"></div>

                <section class="receipt-main-grid">
                  <div class="receipt-main-grid-header">
                    <h2 data-i18n="bill.flow.summarySectionTitle"></h2>
                  </div>
                  <div class="receipt-main-grid-columns" data-columns="1">
                    <div class="receipt-info-column">
                      <div class="receipt-info-rows">
                        <div class="receipt-info-row">
                          <span
                            class="receipt-info-row-label"
                            data-i18n="bill.flow.summaryPaid"
                          ></span>
                          <span class="receipt-info-row-value" id="bill-flow-paid-count-value"
                            >0</span
                          >
                        </div>
                        <div class="receipt-info-row">
                          <span
                            class="receipt-info-row-label"
                            data-i18n="bill.flow.summaryUnpaid"
                          ></span>
                          <span class="receipt-info-row-value" id="bill-flow-unpaid-count-value"
                            >0</span
                          >
                        </div>
                        <div class="receipt-info-row">
                          <span
                            class="receipt-info-row-label"
                            data-i18n="bill.flow.summaryPaidAmount"
                          ></span>
                          <span class="receipt-info-row-value" id="bill-flow-paid-amount-value"
                            >0</span
                          >
                        </div>
                      </div>
                    </div>
                  </div>
                </section>
              </div>
            </div>
          </section>

          <!-- Init error: single main column -->
          <section
            id="payment-init-error-section"
            class="init-error-section"
            hidden
            aria-labelledby="payment-init-error-heading"
          >
            <div class="init-error-container">
              <div class="card init-error-card" id="payment-init-error-root">
                <!-- Filled by PaymentInitErrorScreen (EmptyState) -->
              </div>
            </div>
          </section>

          <!-- Auto redirect loading after receipt timer end -->
          <section
            id="payment-redirect-loading-section"
            class="init-error-section"
            hidden
            aria-labelledby="redirect-loading-title"
          >
            <div class="init-error-container">
              <div class="card redirect-loading-card">
                <div class="redirect-loading-content">
                  <div class="redirect-loading-spinner spinner" aria-hidden="true"></div>
                  <h2 id="redirect-loading-title" data-i18n="redirect.loadingTitle"></h2>
                  <button
                    type="button"
                    class="btn btn-primary redirect-manual-button"
                    id="redirect-manual-button"
                    data-i18n="timer.returnToMerchant"
                    hidden
                  ></button>
                </div>
              </div>
            </div>
          </section>

          <!-- Transaction timeout screen -->
          <section
            id="payment-transaction-expired-section"
            class="init-error-section"
            hidden
            aria-labelledby="transaction-expired-title"
          >
            <div class="init-error-container">
              <div class="card transaction-expired-card">
                <div class="transaction-expired-content">
                  <div id="transaction-expired-empty-root" class="transaction-expired-empty"></div>
                  <div class="transaction-expired-actions">
                    <button
                      type="button"
                      class="btn btn-primary"
                      id="transaction-expired-return-button"
                      data-i18n="timer.returnToMerchant"
                    ></button>
                    <div
                      class="receipt-return-timer transaction-expired-return-timer"
                      id="transaction-expired-return-timer"
                    >
                      <span class="timer-progress" aria-hidden="true"></span>
                      <span data-i18n="receipt.autoReturnPrefix"></span>
                      <strong id="transaction-expired-return-time-value"></strong>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- Network offline screen -->
          <section
            id="payment-offline-section"
            class="init-error-section"
            hidden
            aria-labelledby="payment-offline-title"
          >
            <div class="init-error-container">
              <div class="card init-error-card" id="payment-offline-root">
                <!-- Filled by PaymentInitErrorScreen (EmptyState) -->
              </div>
            </div>
          </section>
        </div>
      </main>

      <!-- Footer will be inserted here -->
    </div>

    <!-- Scripts -->
    <script nomodule>
      (function showUnsupportedBrowserScreen() {
        var appRoot = document.getElementById('app');
        var unsupportedSection = document.getElementById('browser-unsupported-section');
        if (appRoot) {
          appRoot.setAttribute('hidden', '');
        }
        if (unsupportedSection) {
          unsupportedSection.hidden = false;
        }
      })();
    </script>
    <script type="module" src="/assets/js/main.js"></script>
    <script type="module" src="/assets/js/pages/index.js"></script>
  </body>
</html>
