<!doctype html>
<html lang="fa" dir="rtl" class="app-booting">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#007dff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>درگاه پرداخت</title>
    <!-- Match index.css: hide main until markAppReady() (before external CSS loads) -->
    <style>
      html.app-booting #app .main-content {
        visibility: hidden;
      }
    </style>

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />

    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/base.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/pages/index.css" />
    <link rel="stylesheet" href="/assets/css/pages/receipt.css" />
  </head>
  <body>
    <div id="app">
      <!-- SSR: session fields (same as former Data.* hidden inputs). Server fills data-* values. -->
      <div
        id="payment-init-data"
        class="payment-init-data"
        hidden
        aria-hidden="true"
        data-user-session-key="F274EC8CF41D4A4A88050DDB6FAC534790DAC6C9BE623E88E58E8C95DD31511D"
        data-transaction-id="63"
        data-ref-num="9CCA4792E9F80F7E94513EC464412F4D97EF887A8B5300C95D2CD5E8ED5A8E56"
        data-terminal-number="2765"
        data-salt="7f479858b67248068fb4aa2a0b258965"
      ></div>

      <!-- Header will be inserted here -->

      <main class="main-content">
        <div class="container">
          <!-- Checkout flow (two-column grid) -->
          <section id="payment-flow-section" class="payment-flow-section">
          <div class="grid grid-2-col">
            <!-- Large Card (2/3) -->
            <div class="card card-large">
              <div class="card-header">
                <h2 class="card-title" data-i18n="form.title">اطلاعات کارت خود را وارد کنید</h2>
                <button
                  type="button"
                  class="card-header-help-btn"
                  id="card-header-help-button"
                  aria-label="راهنما"
                >
                  <span
                    class="app-icon"
                    style="--app-icon-src: url('/assets/images/icons/icn-square-help.svg')"
                    aria-hidden="true"
                  ></span>
                </button>
              </div>

              <div id="payment-form-region" class="payment-form-region">
              <form id="payment-form" class="payment-form" method="post" autocomplete="off">
                <!-- Card Number -->
                <div class="form-group">
                  <div id="card-number-input-container"></div>
                </div>

                <!-- CVV2 and Expiry Date -->
                <div class="form-group">
                  <div class="form-row">
                    <div id="cvv2-input-container"></div>
                    <div id="expiry-date-container"></div>
                  </div>
                </div>

                <!-- Security Code (Captcha) -->
                <div class="form-group">
                  <div id="captcha-container" class="captcha-container"></div>
                </div>

                <!-- OTP -->
                <div class="form-group">
                  <div id="otp-input-container" class="otp-input-container"></div>
                </div>

                <!-- Save Card Checkbox -->
                <div class="form-group">
                  <label class="save-card-toggle">
                    <input
                      type="checkbox"
                      id="save-card-checkbox"
                      class="save-card-checkbox"
                      autocomplete="off"
                    />
                    <span class="save-card-icon" aria-hidden="true">
                      <span
                        class="app-icon"
                        style="--app-icon-src: url('/assets/images/icons/icn-square-check.svg')"
                        aria-hidden="true"
                      ></span>
                    </span>
                    <span class="save-card-text" data-i18n="form.saveCard">
                      ذخیره امن اطلاعات غیر حساس کارت در درگاه سپ
                    </span>
                  </label>
                </div>

                <!-- Form Actions -->
                <div class="form-actions">
                  <button
                    type="submit"
                    class="btn btn-success"
                    id="pay-button"
                    data-i18n="form.pay"
                  >
                    پرداخت
                  </button>
                  <button
                    type="button"
                    class="btn btn-primary btn-bordered"
                    id="cancel-button"
                    data-i18n="form.cancel"
                  >
                    انصراف
                  </button>
                </div>

                <!-- Show Receipt -->
                <div class="form-group show-receipt-wrapper">
                  <label class="show-receipt-toggle">
                    <input
                      type="checkbox"
                      id="show-receipt-toggle"
                      class="show-receipt-checkbox"
                      autocomplete="off"
                    />
                    <span class="show-receipt-icon" aria-hidden="true">
                      <span
                        class="app-icon"
                        style="--app-icon-src: url('/assets/images/icons/icn-square-plus.svg')"
                        aria-hidden="true"
                      ></span>
                    </span>
                    <span class="show-receipt-text" data-i18n="form.showReceiptToggle">
                      ایمیل یا شماره موبایل برای ارسال رسید پرداخت (اختیاری)
                    </span>
                  </label>
                </div>

                <!-- Receipt Fields (Hidden initially) -->
                <div id="receipt-fields" class="receipt-fields">
                  <div class="form-group">
                    <div id="mobile-input-container"></div>
                  </div>
                  <div class="form-group">
                    <div id="email-input-container"></div>
                  </div>
                </div>
              </form>
              </div>
            </div>

            <!-- Small Card (1/3) -->
            <div class="card card-small">
              <div class="card-header" id="timer-header">
                <h2 class="card-title" data-i18n="timer.title">زمان باقی‌مانده</h2>
                <div id="timer-container" class="timer">
                  <div class="timer-value">15:00</div>
                </div>
              </div>

              <div id="partner-logos-section" class="partner-logos-section">
                <div id="partner-logos" class="partner-logos">
                  <!-- Partner logos will be inserted here -->
                </div>
              </div>

              <div id="transaction-info" class="transaction-info">
                <!-- Transaction info will be inserted here -->
              </div>
            </div>
          </div>
          </section>

          <!-- Successful pay: full-width receipt (same layout as receipt.html; filled from pay API). -->
          <section
            id="payment-receipt-section"
            class="init-error-section payment-receipt-section"
            hidden
            aria-labelledby="payment-receipt-title"
          >
            <div class="init-error-container receipt-container">
              <div class="card init-error-card" id="payment-receipt-card">
                <div class="receipt-header">
                  <div class="receipt-status">
                    <span class="badge badge-success" id="payment-receipt-status-badge"></span>
                  </div>
                  <h1 class="receipt-title" id="payment-receipt-title"></h1>
                  <p class="receipt-subtitle" id="payment-receipt-subtitle"></p>
                  <div class="receipt-amount" id="payment-receipt-amount"></div>
                  <div class="receipt-type" id="payment-receipt-type"></div>
                </div>

                <div class="transaction-divider"></div>

                <div class="transaction-info">
                  <h3 class="transaction-info-section-title" data-i18n="receipt.sectionMerchant">
                    اطلاعات پذیرنده
                  </h3>
                  <div class="transaction-info-item">
                    <span class="transaction-info-label" data-i18n="receipt.merchant">پذیرنده:</span>
                    <span class="transaction-info-value" id="payment-receipt-merchant-name"></span>
                  </div>
                </div>

                <div class="transaction-divider"></div>

                <div class="transaction-info">
                  <h3 class="transaction-info-section-title" data-i18n="receipt.sectionTransaction">
                    اطلاعات تراکنش
                  </h3>
                  <div class="transaction-info-item">
                    <span class="transaction-info-label" data-i18n="receipt.traceNo">شماره پیگیری:</span>
                    <span class="transaction-info-value" id="payment-receipt-trace"></span>
                  </div>
                  <div class="transaction-info-item" id="payment-receipt-row-rrn" hidden>
                    <span class="transaction-info-label" data-i18n="receipt.rrn">شماره مرجع:</span>
                    <span class="transaction-info-value" id="payment-receipt-rrn"></span>
                  </div>
                  <div class="transaction-info-item" id="payment-receipt-row-ptrace" hidden>
                    <span class="transaction-info-label" data-i18n="receipt.pTraceNo">شماره پیگیری ترمینال:</span>
                    <span class="transaction-info-value" id="payment-receipt-ptrace"></span>
                  </div>
                  <div class="transaction-info-item" id="payment-receipt-row-terminal" hidden>
                    <span class="transaction-info-label" data-i18n="receipt.terminal">ترمینال:</span>
                    <span class="transaction-info-value" id="payment-receipt-terminal"></span>
                  </div>
                  <div class="transaction-info-item">
                    <span class="transaction-info-label" data-i18n="receipt.plain.date">تاریخ:</span>
                    <span class="transaction-info-value" id="payment-receipt-date"></span>
                  </div>
                  <div class="transaction-info-item">
                    <span class="transaction-info-label" data-i18n="receipt.plain.card">شماره کارت:</span>
                    <span class="transaction-info-value" id="payment-receipt-card-number"></span>
                  </div>
                </div>

                <div class="transaction-divider"></div>

                <div class="receipt-actions">
                  <button type="button" class="btn btn-primary btn-bordered" id="payment-receipt-share-button">
                    <span class="btn-icon" aria-hidden="true">📤</span>
                    <span data-i18n="receipt.share">اشتراک‌گذاری</span>
                  </button>
                  <button type="button" class="btn btn-success" id="payment-receipt-save-button">
                    <span class="btn-icon" aria-hidden="true">💾</span>
                    <span data-i18n="receipt.save">ذخیره در گالری</span>
                  </button>
                </div>

                <div class="receipt-logo">
                  <img src="/assets/images/logo-mini.svg" alt="" />
                </div>
              </div>
            </div>
          </section>

          <!-- Init error: single main column (same layout pattern as receipt.html) -->
          <section
            id="payment-init-error-section"
            class="init-error-section"
            hidden
            aria-labelledby="payment-init-error-heading"
          >
            <div class="init-error-container">
              <div class="card init-error-card" id="payment-init-error-root">
                <!-- Filled by PaymentInitErrorScreen (EmptyState) -->
              </div>
            </div>
          </section>
        </div>
      </main>

      <!-- Footer will be inserted here -->
    </div>

    <!-- Scripts -->
    <script type="module" src="/assets/js/main.js"></script>
    <script type="module" src="/assets/js/pages/index.js"></script>
  </body>
</html>
